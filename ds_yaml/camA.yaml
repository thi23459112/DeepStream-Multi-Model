# ============================================================
# DeepStream 車流計數 - camA 設定
# ============================================================

source_id: "camA"                     # 來源代號，寫進 DB CameraCode 欄位

# ------------------------------------------------------------
# 裝置資訊
# ------------------------------------------------------------
device:
  code: "EdgeX317"                    # 邊緣機代號，寫進 DB DeviceCode 欄位

# ------------------------------------------------------------
# 輸入來源 ⭐
# ------------------------------------------------------------
# 可填：
#   "videos/test1.avi"                # 影片（相對路徑，放在 videos/ 資料夾）
#   "rtsp://user:pass@ip:port/path"   # RTSP 串流
source: "videos/test1.avi"

stream_fps: 15.0                      # 影片 / 串流 FPS
start_time: "2025-05-22 00:23:57"     # 影片首幀對應的真實時刻（RTSP 自動忽略）
                                      # 格式：YYYY-MM-DD HH:MM:SS

# ------------------------------------------------------------
# 模型 Engine
# ------------------------------------------------------------
weight: "car_fp16.engine"             # engine 檔
weight_imgsz: 640                     # 車輛模型輸入解析度
weight_batch_size: 2                  # engine max batch
# keep_classes ⭐：這一路只保留哪些「模型原始 class_id」
#   yolo11s 是 COCO 80 類模型，會偵測 person 以外的物件；
#   只留 person 時，光刪 labels 檔沒用（labels 只是名稱對照），必須在這裡指定白名單。
#   COCO：person=0（若還要車輛，可加 [0,2,5,7]=person,car,bus,truck）
keep_classes: [0, 1, 2, 3, 4, 5, 6]

# ------------------------------------------------------------
# 偵測閾值
# ------------------------------------------------------------
detect:
  car_conf: 0.25                      # PGIE 信心值閾值（所有車種共用）
  car_iou:  0.45                      # PGIE NMS IoU 閾值

# ------------------------------------------------------------
# ROI / 裁切遮罩 ⭐
# ------------------------------------------------------------
geometry:
  base_w: 1920                        # 來源畫面寬
  base_h: 1080                        # 來源畫面高

  # 計數 ROI（可定義多個，一台車經過多個 ROI 各寫一筆 DB）
  regions:
    roi_1:
      - [0,    100]
      - [1920, 100]
      - [1920, 1080]
      - [0,    1080]

  # 裁切遮罩：此矩形以外不送進 PGIE（節省算力）
  crop_points:
    - [0,    50]
    - [1920, 50]
    - [1920, 1080]
    - [0,    1080]

# ------------------------------------------------------------
# 結算規則
# ------------------------------------------------------------
session:
  cleanup_frames: 30                  # 物件消失 N 幀後結算
  flush_interval_seconds: 0           # 每 N 秒把 pending 寫進 DB（0=即時）

# ------------------------------------------------------------
# 容忍 / 抖動過濾 ⭐
# ------------------------------------------------------------
# axis = in/out 依據哪一個座標軸判斷
#   "y"（預設）→ 看垂直位移：向下為 IN、向上為 OUT
#   "x"        → 看水平位移：向右為 IN、向左為 OUT
#   （若該軸的 IN/OUT 方向與現場相反，將進出對調即可）
# movement_threshold = 所選軸的位移像素門檻
#   位移 > 此值  → IN （y:向下 / x:向右）
#   位移 < -此值 → OUT（y:向上 / x:向左）
#   絕對值 < 此值 → NA（視為抖動誤判，不寫 DB）
# min_roi_hits = ROI 命中最少幀數（防止短暫飄過誤判）
track_logic:
  axis: "y"                            # ⭐ 改這裡切換判斷軸：'y'（上下）或 'x'（左右）
  movement_threshold: 30
  min_roi_hits: 2

# ------------------------------------------------------------
# 輸出設定 ⭐
# ------------------------------------------------------------
output:
  save_output_video: true             # 可選：true / false  是否輸出推理後影片
  output_video_dir: "output_video"

  save_output_db: true                # 可選：true / false  是否寫入 SQLite DB
  output_db_dir: "output_db"          # DB 檔輸出資料夾

# ------------------------------------------------------------
# 本地顯示 ⭐
# ------------------------------------------------------------
display:
  show_window: true                   # 可選：true / false  本地預覽視窗
  show_fps_overlay: true              # 可選：true / false  畫面左上 FPS
  show_roi: true                      # 可選：true / false  ROI 黃線
  show_crop: true                     # 可選：true / false  裁切框青綠線

# ------------------------------------------------------------
# 追蹤器 ⭐
# ------------------------------------------------------------
# 微調該追蹤器內部參數 → 編輯 boxmot/configs/trackers/<type>.yaml
# 可選：'nvdcf', 'bytetrack', 'ocsort', 'fasttracker', 'sfsort', 'cbiou'
tracker:
  type: "fasttracker"                 # ⭐ 改這裡切換追蹤器
